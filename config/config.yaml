sylius_grid:
    grids:
        sylius_invoicing_invoice:
            fields:
                pifactnumber:
                    type: twig
                    label: sylius_invoicing.ui.invoice_number
                    path: id
                    options:
                        template: "@ProgramariSyliusPifactPlugin/admin/shared/grid/field/pifact_number.html.twig"
                    sortable: true
                number:
                    enabled: false

